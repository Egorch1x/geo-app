{% extends "base.html" %}

{% block content %}
<div class="flex flex-col items-center justify-center min-h-[70vh] text-center">

    <h1 class="text-5xl md:text-6xl font-bold tracking-tight mb-4">
        Geo<span class="text-zinc-500">.</span>Quiz
    </h1>

    <p class="text-zinc-400 text-lg max-w-md mb-10">
        Образовательный сервис для изучения столиц мира.
        Проверь свои знания в интерактивном формате.
    </p>

    <div class="flex gap-4">
        <a href="{{ url_for('main.quiz') }}"
           class="bg-white text-black px-8 py-3 rounded-lg font-medium hover:bg-zinc-200 transition">
            Начать игру
        </a>

        <a href="{{ url_for('main.countries_list') }}"
           class="border border-zinc-700 px-8 py-3 rounded-lg font-medium hover:bg-zinc-900 transition">
            Справочник
        </a>
    </div>

    <div class="mt-20 grid grid-cols-3 gap-12 border-t border-zinc-800 pt-10 w-full max-w-xl">

        <div>
            <span class="block text-2xl font-semibold">195+</span>
            <span class="text-xs uppercase tracking-wider text-zinc-500">
                Стран
            </span>
        </div>

        <div>
            <span class="block text-2xl font-semibold">Quiz</span>
            <span class="text-xs uppercase tracking-wider text-zinc-500">
                Формат
            </span>
        </div>

        <div>
            <span class="block text-2xl font-semibold">100%</span>
            <span class="text-xs uppercase tracking-wider text-zinc-500">
                Бесплатно
            </span>
        </div>

    </div>

</div>
{% endblock %}
