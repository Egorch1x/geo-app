<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} | Geo Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-zinc-950 text-zinc-100 min-h-screen flex flex-col">

    <!-- Navbar -->
    <nav class="border-b border-zinc-800 bg-zinc-950/80 backdrop-blur sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">

            <a href="{{ url_for('main.index') }}"
               class="text-lg font-semibold tracking-wide hover:text-zinc-300 transition">
                GEO QUIZ
            </a>

            <div class="flex gap-6 text-sm">
                <a href="{{ url_for('main.countries_list') }}"
                   class="hover:text-zinc-400 transition">
                    Страны
                </a>

                <a href="{{ url_for('main.add_country') }}"
                   class="hover:text-zinc-400 transition">
                    Добавить
                </a>

                <a href="{{ url_for('main.quiz') }}"
                   class="hover:text-zinc-400 transition">
                    Играть
                </a>
            </div>

        </div>
    </nav>

    <!-- Content -->
    <main class="flex-1 max-w-6xl mx-auto w-full px-4 py-8">

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="mb-4 p-4 rounded-lg text-sm
                        {% if category == 'success' %}
                            bg-emerald-900/40 border border-emerald-700 text-emerald-300
                        {% else %}
                            bg-red-900/40 border border-red-700 text-red-300
                        {% endif %}
                    ">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}

    </main>

    <footer class="border-t border-zinc-800 text-zinc-500 text-sm">
        <div class="max-w-6xl mx-auto px-4 py-6 text-center">
            Geo Quiz • {{ 2026 }}
        </div>
    </footer>

</body>
</html>
